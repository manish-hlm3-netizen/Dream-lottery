name: lottery_app
description: A lottery app for Android

publish_to: 'none'

version: 1.4.9+22

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP client
  dio: ^5.4.0

  # State management
  provider: ^6.1.1

  # Secure storage for JWT
  flutter_secure_storage: ^9.0.0

  # UI helpers
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  intl: ^0.19.0
  fluttertoast: ^8.2.4
  url_launcher: ^6.2.0

  cupertino_icons: ^1.0.6
  video_player: ^2.11.1
  share_plus: ^12.0.2
  path_provider: ^2.1.2
  open_file: ^3.5.11
  permission_handler: ^11.3.1
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  image_path: "assets/images/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - shorebird.yaml
